<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Account Deletion Request</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background:#f5f7fb;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
      <td align="center">
        <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; padding:30px;">
          
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <img src="{{logo}}" alt="Xpay Logo" width="120" />
            </td>
          </tr>

          <tr>
            <td>
              <h2 style="margin:0;">Hello {{firstName}},</h2>
              <p style="color:#555; line-height:1.6;">
                We have received your request to delete your Xpay account.
              </p>
              <p style="color:#555; line-height:1.6;">
                Your request is currently under review. You will be notified once a decision has been made.
              </p>

              <p style="color:#999; font-size:13px;">
                If you did not initiate this request, please contact support immediately.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding-top:30px;">
              <p>Best regards,<br><strong>Xpay Team</strong></p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
